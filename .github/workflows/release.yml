name: Build and Release

# Builds the userspace AmneziaWG packages (amneziawg-go + awg) for every
# supported router architecture and publishes them as a GitHub Release.
#
#   * Push a tag like  v1.1.7   -> builds and creates/updates that release
#   * "Run workflow" (manual)   -> builds and uploads the .ipk as run artifacts
#
# No kernel module is built: this is a pure userspace package. The awg CLI is
# linked statically against musl so it runs on the router's older glibc.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  # amneziawg-tools (awg) release tag — the static-musl awg CLI is built from this tag
  AWG_TOOLS_TAG: v1.0.20260223
  # amneziawg-go (daemon) — built from OUR FORK, not upstream, until upstream merges the
  # patches the router build needs (all carried as real commits on the fork branch below):
  #   1. bounded buffer pool (PreallocatedBuffersPerPool, router default 1024) — the fix for
  #      daemon OOM under load on low-RAM boxes (was a CI sed here; now a fork commit),
  #   2. sendmmsg/recvmmsg -> sendmsg/recvmsg ENOSYS fallback — without it the daemon can't send
  #      a single packet on Linux < 3.0 (RT-AC68U / 2.6.36), so the tunnel never passes traffic,
  #   3. runtime pool-size control (upstream PR #152): the daemon reads
  #      WG_PREALLOCATED_BUFFERS_PER_POOL at start (0 = unbounded) — the addon launcher un-caps
  #      the pool on high-RAM boxes (>= 768MiB) for full throughput; the compiled default stays
  #      the router-safe 1024 for any launch without the env.
  # The branch is based on the v0.2.19 tag (AWG_GO_TAG), so it keeps the AmneziaWG 1.5/2.0
  # obfuscation params (I1-I5, S3/S4) + "handle empty I1-I5" fix — reproducible, not floating
  # master. When upstream merges the PRs, point AWG_GO_REPO back to amnezia-vpn + drop the
  # asserts that are then upstream. (version.go still hardcodes a stale const — see the sed below.)
  AWG_GO_TAG: v0.2.19
  AWG_GO_REPO: https://github.com/william-aqn/amneziawg-go.git
  AWG_GO_REF: router-build

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (ARM emulation for the static-musl awg build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build amneziawg-go (aarch64 + ARM32)
        run: |
          set -eux
          git clone --depth 1 --branch "$AWG_GO_REF" "$AWG_GO_REPO" amneziawg-go
          AWG_GO_COMMIT=$(git -C amneziawg-go rev-parse --short HEAD)
          echo "amneziawg-go: $AWG_GO_REPO ref $AWG_GO_REF (based on $AWG_GO_TAG) commit: $AWG_GO_COMMIT"
          # `Version` is a `const` in version.go, so `-ldflags -X main.Version=` can't override it
          # (only vars). Patch the source so `amneziawg-go --version` reports the real ref instead
          # of the stale hardcoded "0.0.20250522" (which has fooled diagnosis before). The
          # -poolcfg-smfix suffix marks the fork patches (bounded pool, default 1024, runtime
          # WG_PREALLOCATED_BUFFERS_PER_POOL override + sendmmsg fallback) — a field diag shows at
          # a glance whether the running daemon carries them, in particular whether it honors the
          # pool env the addon launcher sets on high-RAM boxes (pre-1.3.13 daemons say -pool1024
          # here and ignore that env).
          sed -i "s|^const Version = .*|const Version = \"$AWG_GO_TAG-poolcfg-smfix ($AWG_GO_COMMIT)\"|" amneziawg-go/version.go
          grep '^const Version' amneziawg-go/version.go || true
          # The functional patches now ride in as COMMITS on the fork branch (see the env
          # block) rather than seds — but still HARD-assert each is present, so a bad rebase or a
          # wrong AWG_GO_REF fails the build instead of silently shipping a broken daemon:
          #   1. BOUNDED BUFFER POOL, default 1024 (upstream's iOS/Windows profile) — the fix for
          #      "daemon OOM under heavy load" on low-RAM routers. Upstream's Linux profile leaves
          #      it 0 (unbounded): under sustained inbound the receive routine allocates 64KB
          #      buffers faster than software ChaCha20 drains them and the runtime aborts with
          #      `runtime: out of memory`. 1024 caps the pool at 64MB and turns WaitPool.Get into
          #      real backpressure (excess UDP dropped by the kernel). NB the 64KB MaxSegmentSize
          #      is deliberately NOT shrunk — the cap is size-agnostic and UDP-GRO kernels (>=4.18)
          #      can coalesce up to 64KB. Since 1.3.13 the bound is a VAR overridable at start via
          #      WG_PREALLOCATED_BUFFERS_PER_POOL (0 = unbounded — the addon launcher sets that on
          #      high-RAM boxes for full throughput; the compiled default must STAY 1024 so any
          #      launch without the env keeps the OOM protection). Assert BOTH the router-safe
          #      default and the env hook, so neither can silently vanish:
          grep -q 'var PreallocatedBuffersPerPool uint32 = 1024' amneziawg-go/device/queueconstants_default.go
          grep -q 'WG_PREALLOCATED_BUFFERS_PER_POOL' amneziawg-go/main.go
          #   2. SENDMMSG/RECVMMSG -> per-packet ENOSYS FALLBACK — StdNetBind uses WriteBatch/
          #      ReadBatch (sendmmsg/recvmmsg, added in Linux 3.0). On the RT-AC68U's 2.6.36 they
          #      return ENOSYS, so WITHOUT this the daemon forms handshakes but can't send/recv a
          #      single packet (tunnel up, no traffic, forever). The fork adds a sticky
          #      batchUnsupported flag that falls back to WriteMsgUDP/ReadMsgUDP. Proven on a real
          #      RT-AC68U: handshake completes, traffic flows both ways.
          grep -q 'batchUnsupported' amneziawg-go/conn/bind_std.go
          mkdir -p "$GITHUB_WORKSPACE/output"
          cd amneziawg-go
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64       go build -trimpath -ldflags="-s -w" -o "$GITHUB_WORKSPACE/output/amneziawg-go"
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build -trimpath -ldflags="-s -w" -o "$GITHUB_WORKSPACE/output/amneziawg-go-arm"
          # NOTE: the GOARM=5 daemon for the armv7-2.6 package is built by the SEPARATE legacy
          # step below with a pinned Go 1.23 toolchain — Go >= 1.24 does not support the
          # 2.6.3x kernels those routers run (RT-AC68U class).

      - name: Build amneziawg-go-arm5 (legacy Go 1.23 for 2.6.3x kernels — RT-AC68U class)
        run: |
          set -eux
          # Go >= 1.24 supports only Linux >= 3.2; on the RT-AC68U's 2.6.36 the runtime is
          # officially unsupported and was seen dying silently right after the wireguard-go
          # banner ("failed to create interface", daemon exit with no message). Go 1.23
          # supports Linux >= 2.6.32, so the armv7-2.6 package ships a Go 1.23 build.
          # amneziawg-go v0.2.19 demands go 1.24 only through dependency pins — the code
          # compiles clean on 1.23 against the newest 1.23-compatible x/* line (x/sys v0.35,
          # x/net v0.43, x/crypto v0.41). The mobile-only ./outline subpackage (hard-requires
          # go 1.24 via outline-sdk) is NOT linked into the daemon, so it doesn't constrain
          # this build. Verified on a real 2.6.32 kernel (qemu-system-arm versatilepb, Debian
          # Squeeze armel): TUN creation + obfuscated setconf + UAPI all pass.
          cp -r amneziawg-go amneziawg-go-legacy
          cd amneziawg-go-legacy
          AWG_GO_COMMIT=$(git rev-parse --short HEAD)
          sed -i "s|^const Version = .*|const Version = \"$AWG_GO_TAG-legacy26-poolcfg-smfix ($AWG_GO_COMMIT)\"|" version.go
          grep '^const Version' version.go
          # The fork patches rode in via the cp -r above — assert them, hard-fail otherwise.
          # The 2.6.x fleet (RT-AC68U, 256MB!) needs the pool cap even more than 512MB boxes
          # (all far below 768MiB, so the launcher never un-caps the pool there), and
          # — critically — this legacy build is the ONLY one that runs on the 2.6.36 kernels where
          # the sendmmsg fallback is load-bearing: without it this daemon can't pass a single byte.
          grep -q 'var PreallocatedBuffersPerPool uint32 = 1024' device/queueconstants_default.go
          grep -q 'WG_PREALLOCATED_BUFFERS_PER_POOL' main.go
          grep -q 'batchUnsupported' conn/bind_std.go
          go get golang.org/x/sys@v0.35.0 golang.org/x/net@v0.43.0 golang.org/x/crypto@v0.41.0
          go mod edit -go=1.23.0 -toolchain=none
          GOTOOLCHAIN=go1.23.12 CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=5 \
            go build -trimpath -ldflags="-s -w" -o "$GITHUB_WORKSPACE/output/amneziawg-go-arm5"
          # Prove the legacy toolchain + pins actually made it into the shipped binary.
          go version -m "$GITHUB_WORKSPACE/output/amneziawg-go-arm5" | grep -E 'go1\.23|golang.org/x/sys'

      - name: Build awg (aarch64, static musl in emulated Alpine)
        run: |
          set -eux
          mkdir -p "$GITHUB_WORKSPACE/output"
          docker run --rm --platform linux/arm64 -v "$GITHUB_WORKSPACE/output:/out" alpine:3.19 sh -c "apk add --no-cache build-base linux-headers git && git clone --depth 1 --branch $AWG_TOOLS_TAG https://github.com/amnezia-vpn/amneziawg-tools.git /t && cd /t/src && make LDFLAGS=-static PLATFORM_CFLAGS= && { cp awg /out/awg 2>/dev/null || cp wg /out/awg; } && chmod +x /out/awg"
          file "$GITHUB_WORKSPACE/output/awg"

      - name: Build awg-arm (ARM32, static musl in emulated Alpine)
        run: |
          set -eux
          mkdir -p "$GITHUB_WORKSPACE/output"
          docker run --rm --platform linux/arm/v7 -v "$GITHUB_WORKSPACE/output:/out" alpine:3.19 sh -c "apk add --no-cache build-base linux-headers git && git clone --depth 1 --branch $AWG_TOOLS_TAG https://github.com/amnezia-vpn/amneziawg-tools.git /t && cd /t/src && make LDFLAGS=-static PLATFORM_CFLAGS= && { cp awg /out/awg-arm 2>/dev/null || cp wg /out/awg-arm; } && chmod +x /out/awg-arm"
          file "$GITHUB_WORKSPACE/output/awg-arm"

      - name: Build awg-arm5 (old ARM, static musl, SOFT-FLOAT for VFP-less Cortex-A9)
        run: |
          set -eux
          mkdir -p "$GITHUB_WORKSPACE/output"
          # RT-AC68U (BCM4708 Cortex-A9) exposes NO hardware float — /proc/cpuinfo Features
          # is "swp half thumb fastmult edsp" (no vfp/neon). Any HARD-FLOAT (VFP) binary
          # SIGILLs on its first float op, which is why even the Alpine armhf (ARMv6 + VFP)
          # build failed. awg must be SOFT-FLOAT, exactly like the GOARM=5 daemon that works.
          # Alpine has no soft-float port, so build with dockcross linux-armv5-musl:
          # gcc + musl + ARMv5 (no VFP) + soft-float ABI, statically linked.
          docker run --rm -e AWG_TOOLS_TAG -v "$GITHUB_WORKSPACE/output:/out" dockcross/linux-armv5-musl bash -c '
            set -eux
            if [ -z "${CC:-}" ]; then CC=$(command -v arm-unknown-linux-musleabi-gcc arm-linux-musleabi-gcc 2>/dev/null | head -1); fi
            [ -z "${CC:-}" ] && CC=$(ls /usr/xcc/*/bin/*linux-musleabi-gcc 2>/dev/null | head -1)
            : "${CC:?no soft-float musl cross gcc found in image}"
            "$CC" --version | head -1
            command -v git >/dev/null 2>&1 || { apt-get update && apt-get install -y --no-install-recommends git ca-certificates; }
            git clone --depth 1 --branch "$AWG_TOOLS_TAG" https://github.com/amnezia-vpn/amneziawg-tools.git /tmp/awgtools
            make -C /tmp/awgtools/src CC="$CC" LDFLAGS=-static PLATFORM_CFLAGS=
            cp /tmp/awgtools/src/awg /out/awg-arm5 2>/dev/null || cp /tmp/awgtools/src/wg /out/awg-arm5
            chmod +x /out/awg-arm5
          '
          file "$GITHUB_WORKSPACE/output/awg-arm5"
          # Guard: never ship a hard-float awg again. The hard-float ABI emits the
          # Tag_ABI_VFP_args build attribute; a soft-float build does not.
          if readelf -A "$GITHUB_WORKSPACE/output/awg-arm5" | grep -q 'Tag_ABI_VFP_args'; then
            echo "ERROR: awg-arm5 is hard-float (VFP) — would SIGILL on VFP-less routers like RT-AC68U"; exit 1
          fi
          echo "awg-arm5 is soft-float — OK"

      - name: Build .ipk packages
        run: |
          set -eux
          # build-ipk.sh calls gtar (GNU tar); Ubuntu's tar is GNU tar
          sudo ln -sf "$(command -v tar)" /usr/local/bin/gtar
          ./build-ipk.sh
          ls -lh output/*.ipk

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amneziawg-ipk
          path: output/*.ipk
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          VERSION="${GITHUB_REF_NAME#v}"
          # Release notes = this version's CHANGELOG.md section (the Russian feature
          # description). Fall back to auto-generated notes if no section is found.
          awk -v v="$VERSION" 'index($0,"### "v" ")==1{f=1;print;next} /^### /&&f{exit} f{print}' CHANGELOG.md > /tmp/relnotes.md
          if [ -s /tmp/relnotes.md ]; then
            NOTES="--notes-file /tmp/relnotes.md"
          else
            NOTES="--generate-notes"
          fi
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            # Drop any stale assets first (e.g. a prior build whose package version differed),
            # so --clobber (which only overwrites same-named files) can't leave them behind.
            for a in $(gh release view "$GITHUB_REF_NAME" --json assets -q '.assets[].name'); do
              case "$a" in *.ipk) gh release delete-asset "$GITHUB_REF_NAME" "$a" -y || true ;; esac
            done
            gh release upload "$GITHUB_REF_NAME" output/*.ipk --clobber
            gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" $NOTES
          else
            gh release create "$GITHUB_REF_NAME" output/*.ipk --title "$GITHUB_REF_NAME" $NOTES
          fi

      # Register the new tag with jsDelivr so its data API resolves it immediately. The
      # router reads the latest version from jsDelivr when api.github.com is blocked;
      # without this, jsDelivr's tag crawl lags the release by minutes/hours.
      - name: Register tag with jsDelivr
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -eux
          VERSION="${GITHUB_REF_NAME#v}"
          curl -sf "https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}@${VERSION}/build-ipk.sh" >/dev/null || true
