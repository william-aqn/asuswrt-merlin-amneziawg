name: Build and Release

# Builds the userspace AmneziaWG packages (amneziawg-go + awg) for every
# supported router architecture and publishes them as a GitHub Release.
#
#   * Push a tag like  v1.1.7   -> builds and creates/updates that release
#   * "Run workflow" (manual)   -> builds and uploads the .ipk as run artifacts
#
# No kernel module is built: this is a pure userspace package. The awg CLI is
# linked statically against musl so it runs on the router's older glibc.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  # amneziawg-tools (awg) — pinned to the same tag as the Dockerfiles
  AWG_TOOLS_TAG: v1.0.20260223

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (ARM emulation for the static-musl awg build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build amneziawg-go (aarch64 + ARM32)
        run: |
          set -eux
          git clone --depth 1 https://github.com/amnezia-vpn/amneziawg-go.git
          echo "amneziawg-go commit: $(git -C amneziawg-go rev-parse HEAD)"
          mkdir -p "$GITHUB_WORKSPACE/output"
          cd amneziawg-go
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64       go build -trimpath -ldflags="-s -w" -o "$GITHUB_WORKSPACE/output/amneziawg-go"
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=5 go build -trimpath -ldflags="-s -w" -o "$GITHUB_WORKSPACE/output/amneziawg-go-arm5"
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build -trimpath -ldflags="-s -w" -o "$GITHUB_WORKSPACE/output/amneziawg-go-arm"

      - name: Build awg (aarch64, static musl in emulated Alpine)
        run: |
          set -eux
          mkdir -p "$GITHUB_WORKSPACE/output"
          docker run --rm --platform linux/arm64 -v "$GITHUB_WORKSPACE/output:/out" alpine:3.19 sh -c "apk add --no-cache build-base linux-headers git && git clone --depth 1 --branch $AWG_TOOLS_TAG https://github.com/amnezia-vpn/amneziawg-tools.git /t && cd /t/src && make LDFLAGS=-static PLATFORM_CFLAGS= && { cp awg /out/awg 2>/dev/null || cp wg /out/awg; } && chmod +x /out/awg"
          file "$GITHUB_WORKSPACE/output/awg"

      - name: Build awg-arm (ARM32, static musl in emulated Alpine)
        run: |
          set -eux
          mkdir -p "$GITHUB_WORKSPACE/output"
          docker run --rm --platform linux/arm/v7 -v "$GITHUB_WORKSPACE/output:/out" alpine:3.19 sh -c "apk add --no-cache build-base linux-headers git && git clone --depth 1 --branch $AWG_TOOLS_TAG https://github.com/amnezia-vpn/amneziawg-tools.git /t && cd /t/src && make LDFLAGS=-static PLATFORM_CFLAGS= && { cp awg /out/awg-arm 2>/dev/null || cp wg /out/awg-arm; } && chmod +x /out/awg-arm"
          file "$GITHUB_WORKSPACE/output/awg-arm"

      - name: Build awg-arm5 (old ARM, static musl, ARMv6 for Cortex-A9 / armv7-2.6)
        run: |
          set -eux
          mkdir -p "$GITHUB_WORKSPACE/output"
          # RT-AC68U/RT-AC66U etc. are Cortex-A9 (ARMv7-A) WITHOUT hardware divide, on
          # the armv7-2.6 Entware target. The armv7 awg above (Alpine linux/arm/v7, built
          # on an A15-like QEMU core) emits udiv/NEON and dies with SIGILL there, while the
          # GOARM=5 amneziawg-go runs fine — hence "amneziawg-go works but awg setconf =
          # Illegal instruction". Build under linux/arm/v6 (Alpine armhf = ARMv6 + VFPv2):
          # a strict instruction subset that also runs on every newer ARMv7 core. This is
          # the awg counterpart to amneziawg-go-arm5; it ships in the armv7-2.6 package.
          docker run --rm --platform linux/arm/v6 -v "$GITHUB_WORKSPACE/output:/out" alpine:3.19 sh -c "apk add --no-cache build-base linux-headers git && git clone --depth 1 --branch $AWG_TOOLS_TAG https://github.com/amnezia-vpn/amneziawg-tools.git /t && cd /t/src && make LDFLAGS=-static PLATFORM_CFLAGS= && { cp awg /out/awg-arm5 2>/dev/null || cp wg /out/awg-arm5; } && chmod +x /out/awg-arm5"
          file "$GITHUB_WORKSPACE/output/awg-arm5"

      - name: Build .ipk packages
        run: |
          set -eux
          # build-ipk.sh calls gtar (GNU tar); Ubuntu's tar is GNU tar
          sudo ln -sf "$(command -v tar)" /usr/local/bin/gtar
          ./build-ipk.sh
          ls -lh output/*.ipk

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amneziawg-ipk
          path: output/*.ipk
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          VERSION="${GITHUB_REF_NAME#v}"
          # Release notes = this version's CHANGELOG.md section (the Russian feature
          # description). Fall back to auto-generated notes if no section is found.
          awk -v v="$VERSION" 'index($0,"### "v" ")==1{f=1;print;next} /^### /&&f{exit} f{print}' CHANGELOG.md > /tmp/relnotes.md
          if [ -s /tmp/relnotes.md ]; then
            NOTES="--notes-file /tmp/relnotes.md"
          else
            NOTES="--generate-notes"
          fi
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" output/*.ipk --clobber
            gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" $NOTES
          else
            gh release create "$GITHUB_REF_NAME" output/*.ipk --title "$GITHUB_REF_NAME" $NOTES
          fi

      # Register the new tag with jsDelivr so its data API resolves it immediately. The
      # router reads the latest version from jsDelivr when api.github.com is blocked;
      # without this, jsDelivr's tag crawl lags the release by minutes/hours.
      - name: Register tag with jsDelivr
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -eux
          VERSION="${GITHUB_REF_NAME#v}"
          curl -sf "https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}@${VERSION}/build-ipk.sh" >/dev/null || true
